---
name: mixpower
title: Mixed Model Power Analysis
jrs: '1.0'
items:
  - name: model
    type: Property

  - name: start
    type: Html
    visible: false

  - name: help
    type: Html
    visible: false

  - name: brief
    type: Html
    visible: false
 
  - name: info
    title: Model Info
    type: Table
    columns:
       - name: info
         type: text
         title: "Info"
       - name: value
         type: text
         title: ""
       - name: specs
         type: text
         title: ""
    refs: gamlj
     
  - name: main
    type: Group
    title: Model Results
    items:
           - name: r2
             title: Model Fit
             type: Table
             description: a table of R
             clearWith:
                         - dep
                         - model_terms
                         - nested_terms
                         - fixed_intercept
                         - reml
                         - comparison
                         - nested_re
                         - nested_intercept
                         - re
                         - re_corr
                         

             rows: 1
             columns:
                    - name: model
                      title: Model
                      visible: (comparison)
                    - name: type
                      type: text
                      title: Type
                    - name: r2
                      title: R²
                      type: number
                    - name:  df1
                      title: df
                      type: integer
                    - name: test
                      title: LRT X²
                      type: number
                    - name: p
                      title: p
                      type: number
                      format: zto,pvalue
             refs: goodness


           - name: anova
             title: Fixed Effects Omnibus Tests
             type: Table
             description: a table of ANOVA results
             clearWith:
                         - relm
                         - dep
                         - model_terms
                         - contrasts
                         - covs_scale
                         - dep_scale
                         - fixed_intercept
                         - df_method
                         - re
                         - re_corr
                         
             columns:
                    - name: source
                      title: ""
                      type: text
                    - name: f
                      title: F
                      type: number

                    - name: df1
                      title: df
                      type: number
                    - name: df2
                      title: df (res)
                      type: number

                    - name: p
                      title: p
                      type: number
                      format: zto,pvalue


           - name: coefficients
             title:  Parameter Estimates (Fixed coefficients)
             type: Table
             clearWith:
                    - relm
                    - dep
                    - model_terms
                    - contrasts
                    - covs_scale
                    - dep_scale
                    - fixed_intercept
                    - ci_width
                    - ci_method
                    - estimates_ci
                    - boot_r
                    - df_method
                    - re
                    - re_corr

             columns:
                    - name: source
                      title: "Names"
                      type: text
                      visible: (show_contrastnames)
                    - name: label
                      title: "Effect"
                      type: text
                    - name: estimate
                      title: "Estimate"
                      type: number
                    - name: se
                      title: SE
                      type: number
                    - name: est.ci.lower
                      type: number
                      title: Lower
                      visible: (estimates_ci)
                    - name: est.ci.upper
                      type: number
                      title: Upper
                      visible: (estimates_ci)
                    - name: df
                      title: "df"
                      type: number
                    - name: t
                      title: "t"
                      type: number
                    - name: p
                      title: "p"
                      type: number
                      format: zto,pvalue

             refs: parameters


           - name: contrastCodeTables
             title: Contrast Coefficients 
             type: Array
             description: an array of contrast coefficients tables
             visible: (show_contrastcodes)
             items: (factors)
             clearWith:
                    - contrasts
             template:
                   title:  "Factor: ___key___"
                   type: Table
                   columns:
                         - name: cname
                           title: 'Name'
                           type: text
                           visible: (show_contrastnames)
                         - name: clab
                           title: 'Contrast'
                           type: text
                         - name: bogus
                           title: 'bogus'
                           type: text
                           visible: false

           - name: random
             title: Random Components
             type: Table
             clearWith:
                    - relm
                    - dep
                    - model_terms
                    - contrasts
                    - covs_scale
                    - dep_scale
                    - fixed_intercept
                    - ci_width
                    - ci_method
                    - boot_r
                    - df_method
                    - re
                    - re_corr
                    - re_ci
             columns:
                    - name: groups
                      title: "Groups"
                      type: text
                      combineBelow: true
                    - name: name
                      title: "Name"
                      type: text
                    - name: std
                      title: "SD"
                      type: number
                    - name: var
                      title: "Variance"
                      type: number
                    - name: var.ci.lower
                      type: number
                      title: Lower
                      visible: (re_ci)
                    - name: var.ci.upper
                      type: number
                      title: Upper
                      visible: (re_ci)
                    - name: icc
                      title: "ICC"
                      type: number

           - name: randomcov
             title: Random Parameters correlations
             type: Table
             visible: false
             clearWith:
                    - relm
                    - dep
                    - model_terms
                    - contrasts
                    - covs_scale
                    - dep_scale
                    - fixed_intercept
                    - ci_width
                    - ci_method
                    - boot_r
                    - df_method
                    - re
                    - re_corr

             columns:
                   - name: groups
                     title: "Groups"
                     combineBelow: true
                     type: text
                   - name: name
                     title: "name"
                     type: text
                   - name: name2
                     title: "name2"
                     type: text
                   - name: std
                     title: "Corr."
                     type: number

           - name: ranova
             title: Random Effect LRT
             type: Table
             visible: (re_lrt)
             clearWith:
                    - relm
                    - dep
                    - model_terms
                    - contrasts
                    - covs_scale
                    - dep_scale
                    - fixed_intercept
                    - ci_width
                    - ci_method
                    - boot_r
                    - df_method
                    - re
                    - re_corr

             columns:
                   - name: test
                     title: "Test"
                     combineBelow: true
                     type: text
                   - name: npar
                     title: "N. par"
                     type: number
                   - name: AIC
                     title: "AIC"
                     type: number
                   - name: LRT
                     title: "LRT"
                     type: number
                   - name: Df
                     title: "df"
                     type: number
                   - name: Pr(>Chisq)
                     title: "p"
                     type: number
                     format: zto,pvalue



