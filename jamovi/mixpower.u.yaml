name: mixpower
title: Mixed Model Power Analysis
jus: '2.0'
compilerMode: tame
events:
  update: './mixed.events::update'
children:
  - type: VariableSupplier
    name: variablesupplier
    stretchFactor: 1
    suggested:
      - continuous
      - nominal
      - ordinal
    persistentItems: false
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: dep
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: factors
            isTarget: true
            events:
              change: './mixed.events::onChange_factors'
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: covs
            isTarget: true
            events:
              change: './mixed.events::onChange_covariates'
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: cluster
            height: small
            isTarget: true
            events:
              change: './mixed.events::onChange_cluster'
  - type: LayoutBox
    margin: large
    style: inline
    children:
      - type: Label
        label: Estimation
        style: list
        children:
          - type: CheckBox
            name: reml
          - name: donotrun
            type: CheckBox
      - type: Label
        label: Model comparison
        children:
          - type: CheckBox
            name: comparison
            events:
              change: './mixed.events::onEvent_comparison'
  - type: CollapseBox
    label: Fixed Effects
    collapsed: true
    stretchFactor: 1
    children:
      - type: Supplier
        name: modelSupplier
        label: Components
        persistentItems: true
        format: term
        stretchFactor: 1
        events:
          update: './gamlj.events::onUpdate_modelSupplier'
        children:
          - type: TargetLayoutBox
            transferAction: interactions
            children:
              - type: ListBox
                name: model_terms
                valueFilter: unique
                isTarget: true
                itemDropBehaviour: emptyspace
                events:
                  change: './mixed.events::onChange_model_terms'
                  listItemRemoved: './mixed.events::onChange_model_remove'
                template:
                  type: TermLabel
              - type: CheckBox
                name: fixed_intercept
          - type: TargetLayoutBox
            name: nested_layout
            transferAction: interactions
            children:
              - type: ListBox
                name: nested_terms
                valueFilter: unique
                isTarget: true
                itemDropBehaviour: emptyspace
                events:
                  change: './gamlj.events::onChange_nested_add'
                template:
                  type: TermLabel
              - type: CheckBox
                name: nested_intercept
                enable: (comparison)
  - type: CollapseBox
    label: Random Effects
    collapsed: true
    stretchFactor: 1
    children:
      - type: Supplier
        name: randomSupplier
        label: Components
        persistentItems: true
        stretchFactor: 1
        events:
          change: './mixed.events::onChange_randomSupplier'
          update: './mixed.events::onUpdate_randomSupplier'
        children:
          - type: TargetLayoutBox
            transferAction: none
            name: re_layout
            children:
              - type: ListBox
                name: re
                height: normal
                addButton: Add correlated effects block
                events:
                  change: './mixed.events::onChange_re_changed'
                selectable: true
                templateName: linreg-block-template
                template:
                  type: LayoutBox
                  margin: normal
                  targetArea: true
                  children:
                    - type: ListBox
                      name: randblockList
                      height: auto
                      isTarget: true
                      valueFilter: unique
                      ghostText: drag term here
                      events:
                        change: './mixed.events::onEvent_addRandomTerm'
                      template:
                        type: TermLabel
                        format: ./rtermFormat
          - type: TargetLayoutBox
            transferAction: none
            name: nested_re_layout
            children:
              - type: ListBox
                name: nested_re
                height: normal
                addButton: Add correlated effects block
                events:
                  listItemAdded: './mixed.events::onEvent_nothing'
                  listItemRemoved: './mixed.events::onEvent_nothing'
                selectable: true
                templateName: linreg-block-template
                template:
                  type: LayoutBox
                  margin: normal
                  targetArea: true
                  children:
                    - type: ListBox
                      name: re_randblockList
                      height: auto
                      isTarget: true
                      valueFilter: unique
                      ghostText: drag term here
                      itemDropBehaviour: emptyspace
                      events:
                        change: './mixed.events::onEvent_addRandomTerm'
                      template:
                        type: TermLabel
                        format: ./rtermFormat
      - type: LayoutBox
        margin: large
        style: inline
        children:
          - type: Label
            label: List components
            children:
              - type: CheckBox
                name: re_modelterms
                events:
                  change: './mixed.events::onEvent_re_list'
              - type: ComboBox
                name: re_listing
                events:
                  change: './mixed.events::onEvent_re_list'
          - type: Label
            label: Effects correlation
            children:
              - type: LayoutBox
                margin: large
                style: list
                children:
                  - type: RadioButton
                    name: re_corr_all
                    optionName: re_corr
                    optionPart: all
                    events:
                      change: './mixed.events::onEvent_corr'
                  - type: RadioButton
                    name: re_corr_none
                    optionName: re_corr
                    optionPart: none
                  - type: RadioButton
                    name: re_corr_block
                    optionName: re_corr
                    optionPart: block
          - type: Label
            label: Tests
            children:
              - type: LayoutBox
                margin: large
                children:
                  - type: CheckBox
                    name: re_lrt
  - type: CollapseBox
    label: Expected Effect Sizes
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Fixed effects size
        stretchFactor: 1
        children:
          - type: ListBox
            name: fixed_sizes
            height: large
            showColumnHeaders: true
            columns:
              - name: name
                label: Effect
                selectable: false
                maxWidth: 300
                template:
                  type: Label
              - name: value
                label: Beta
                selectable: true
                stretchFactor: 0.5
                template:
                  type: TextBox
      - type: Label
        label: Random effects size
        stretchFactor: 1
        children:
          - type: ListBox
            name: re_sizes
            height: large
            showColumnHeaders: true
            columns:
              - name: name
                label: Effect
                selectable: false
                maxWidth: 300
                template:
                  type: Label
              - name: value
                label: Prop. of Variance
                selectable: false
                stretchFactor: 0.5
                template:
                  type: TextBox
  - type: CollapseBox
    label: Factors Coding
    collapsed: true
    stretchFactor: 1
    children:
      - type: ListBox
        name: contrasts
        stretchFactor: 1
        showColumnHeaders: false
        columns:
          - name: var
            label: null
            selectable: false
            stretchFactor: 1
            maxWidth: 300
            template:
              type: VariableLabel
          - name: type
            label: null
            selectable: false
            stretchFactor: 0.5
            template:
              type: ComboBox
  - type: CollapseBox
    label: Options
    style: list
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        style: inline
        children:
          - type: Label
            label: DF Method
            children:
              - type: RadioButton
                name: df_method_Satterthwaite
                optionName: df_method
                optionPart: Satterthwaite
              - name: df_method_Kenward-Roger
                type: RadioButton
                optionName: df_method
                optionPart: Kenward-Roger
