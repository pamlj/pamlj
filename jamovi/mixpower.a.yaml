---
name: mixpower
title: Mixed Model Power Analysis
menuGroup: jpower
version: '3.0.0'
jas: '1.2'
completeWhenFilled: true
export: true
description:
    main: |
          Mixed Linear Model
    R:
        dontrun: false
        usage: |
              data(subjects_by_stimuli)
              gamlj::gamljMixed(
                     formula = y ~ 1 + cond+( 1|subj ),
                     data = subjects_by_stimuli)


formula:
   dep:
     custom: true
   factors: 
     custom: true
   covs: 
     custom: true
   cluster: 
     custom: true
   re: 
     custom: true
   model_terms:
     custom: true

options:
    - name: data
      type: Data
      description:
          R: the data as a data frame

    - name: .caller
      type: String
      default: "lmer"
      hidden: true

    - name: .interface
      type: String
      default: "jamovi"
      hidden: true

    - name: dep
      title: Dependent Variable
      type: Variable
      default:
      suggested:
        - continuous
        - ordinal
      permitted:
        - numeric
      description:
          R: >
            a string naming the dependent variable from `data`; the variable
            must be numeric. Not needed if `formula` is used.

    - name: factors
      title: Factors
      type: Variables
      suggested:
         - nominal
      permitted:
        - factor
      default:
      description:
          R: a vector of strings naming the fixed factors from `data`. Not needed if `formula` is used.

    - name: covs
      title: Covariates
      type: Variables
      suggested:
        - continuous
        - ordinal
      permitted:
        - numeric
      default:
      description:
          R: a vector of strings naming the covariates from `data`. Not needed if `formula` is used.


    - name: model_terms
      title: Model Terms
      type: Terms
      default:
      description:
          R: >
            a list of character vectors describing fixed effects terms. Not needed if `formula` is used.

    - name: fixed_intercept
      title: Fixed Intercept
      type: Bool
      default: true
      description:
          R: >
            `TRUE` (default) or `FALSE`, estimates fixed intercept. Not needed if `formula` is used.

    - name: nested_terms
      title: Nested Model
      type: Terms
      default:
      description:
          R: >
            a list of character vectors describing effects terms for nestet. It can be passed as right-hand formula.

    - name: comparison
      title: Activate
      type: Bool
      default: false
      description:
          R: >
             Not present in R


    - name: nested_intercept
      title: Nested Intercept
      type: Bool
      default: true
      description:
          R: >
            `TRUE` (default) or `FALSE`, estimates fixed intercept. Not needed if `formula` is used.

    - name: omnibus
      title: Test
      type: List
      hidden: true
      default: LRT
      options:
        - name: LRT
          title: LRT

      description:
          R: >
            `TRUE` (default) or `FALSE`, estimates fixed intercept. Not needed if `formula` is used.




    - name: donotrun
      title: Do not run
      type: Bool
      default: false



    - name: fixed_sizes
      type: Array
      template:
          type: Group
          elements:
              - name: name
                type: String
              - name: value
                type: Number

    - name: re_sizes
      type: Array
      template:
          type: Group
          elements:
              - name: name
                type: String
              - name: value
                type: Number



    - name: contrasts
      title: Factors Coding
      type: Array
      items: (factors)
      default: 
      template:
          type: Group
          elements:
              - name: var
                type: Variable
                content: $key
              - name: type
                type: List
                options:
                  - simple
                  - deviation
                  - dummy
                  - difference
                  - helmert
                  - repeated
                  - polynomial

                default: simple
      description:
          R: >
            a named vector of the form `c(var1="type", var2="type2")` specifying the type of contrast to use,
            one of `'deviation'`, `'simple'`, `'dummy'`, `'difference'`, `'helmert'`,
            `'repeated'` or `'polynomial'`. If NULL, `simple` is used. Can also be passed as a list of list of the form list(list(var="var1",type="type1")).

















############ generic with some specs ###########

    - name: model_type
      type: List
      hidden: true
      options:
        - name: lmer
      default: lmer



    - name: cluster
      title: Cluster variables
      type: Variables
      default:  
      suggested:
        - nominal
      description:
          R: a vector of strings naming the clustering variables from `data` 

    - name: re
      title: Random Coefficients
      type: Array
      default: [[]]
      template:
          type: Terms
      description:
          R: >
            a list of lists specifying the models random effects.          

    - name: nested_re
      title: Nested Model Random Coefficients
      type: Array
      default: [[]]
      template:
          type: Terms
      description:
          R: >
            a list of lists specifying the models random effects.          

    - name: re_corr
      title: Effects correlation
      type: List
      options:
        - name: all
          title: Correlated
        - name: none
          title: Not correlated
        - name: block
          title: Correlated by block
      default: all
      description:
          R: >
            `'all'`, `'none'` (default), or `'block'`. When random effects
            are passed as list of length 1, it decides whether the effects should be correlated, 
            non correlated. If `'re'` is a list of 
            lists of length > 1, the option is automatially set to `'block'`.
            The option is ignored if the model is passed using `formula`.


    - name: re_modelterms
      title: Model terms
      type: Bool
      default: true
      description:
          R: >
            Not in R interface
            
            
    - name: re_listing
      type: List
      title: "Add"
      options:
        - name:  none
          title: None
        - name:  main
          title: Main effects
        - name:  way2
          title: Up to 2-way
        - name:  way3
          title: Up to 3-way
        - name:  all
          title: All possible
      default: none
      description:
          R: >
             Not in R interface



    - name: reml
      title: REML
      type: Bool
      default: true
      description:
          R: >
            `TRUE` (default) or `FALSE`, should the Restricted ML be used rather than ML

    - name: re_lrt
      title: LRT for Random Effects
      type: Bool
      default: false
      description:
          R: >
            `TRUE` or `FALSE` (default), LRT for the random effects


####### options ########
    - name: df_method
      title: DF Method
      type: List
      default: Satterthwaite
      options:
        - name: Satterthwaite
          title: Satterthwaite
        - name:  Kenward-Roger
          title: "Kenward-Roger  (slow)"













...

