---
name:  pamljlm
title: GLM Power Analysis
jrs: '1.0'
items:
  - name: model
    type: Property



  - name: info
    title: Model Info
    type: Table
    columns:
       - name: info
         type: text
         title: "Info"
       - name: value
         type: text
         title: ""
       - name: specs
         type: text
         title: ""

  - name: recap
    title: Analysis Recap
    type: Html
    clearWith:
                         -  dep
                         -  factors
                         -  covs
                         -  model_terms
                         -  fixed_sizes
                         -  alpha
                         -  power
                         -  obtain
                         -  n
                         -  mute

  - name: anova
    title: Power Parameters based of F-tests
    type: Table
    description: a table of ANOVA results
    visible: false
    clearWith:
                         -  dep
                         -  factors
                         -  covs
                         -  model_terms
                         -  fixed_sizes
                         -  mute
                         -  alpha
                         -  power
                         -  n
                         -  obtain
  
    columns:
                    - name: source
                      title: ""
                      type: text
                    - name: n
                      title: req. N
                      type: integer
                    - name: df
                      title: df
                      type: integer
                    - name: eta
                      title: η²p
                      type: number
                      format: zto
                    - name: f2
                      title: f2
                      type: number
                      format: zto
                    - name: alpha
                      title: alpha
                      type: number
                      format: zto,pvalue
                    - name: power
                      title: power
                      type: number
                      format: zto

  - name: coefficients
    title: Power Parameters based of t-tests
    type: Table
    description: a table of coefficients results
    visible: false
    clearWith:
                         -  dep
                         -  factors
                         -  covs
                         -  model_terms
                         -  fixed_sizes
                         -  mute
                         -  alpha
                         -  power
                         -  n
                         -  obtain
  
    columns:
                    - name: source
                      title: ""
                      type: text
                    - name: n
                      title: req. N
                      type: integer
                    - name: df
                      title: df
                      type: integer
                    - name: beta
                      title: β
                      type: number
                      format: zto
                    - name: t
                      title: t
                      type: number
                      format: zto
                    - name: f2
                      title: f2
                      type: number
                      format: zto
                    - name: alpha
                      title: alpha
                      type: number
                      format: zto,pvalue
                    - name: power
                      title: power
                      type: number
                      format: zto

