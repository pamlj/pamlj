---
name:  pamlmixed
title: "Mixed Models R"
jrs:   "1.1"

items:
    - name: info
      type: Property
      
    - name: intro
      title: Introduction
      type: Html

    - name: extrainfo
      title: Extra Info
      type: Html
      visible: false

    - name: issues
      title: Issues
      type: Html
      visible: false

    - name: initnotes
      type: Html
      visible: false
 
    - name:  infotab
      title: Model Information
      type: Table
      columns: 
        - name: info
          title: 'Info'
          type: text
          combineBelow: true
        - name: value
          title: ''
          type: text
        - name: specs
          title: ''
          type: text
      refs:
          - pamlj
    - name:  powertab
      title: Power Parameters
      type: Table
      rows:  1
      columns: 
        - name: effect
          title: 'Estimate'
          type: text
        - name: k
          title: 'Cluster levels (k)'
          type: integer
        - name: n
          title: 'N per cluster (n)'
          type: integer

        - name: power
          title: 'Power'
          type: number
        - name: tested
          title: 'Role'
          type: text
          visible: (aim:n)
        - name: df
          title: 'df'
          type: number
        - name: df_error
          title: 'df_error'
          type: number
          visible: (algo:mc)
        - name: sig.level
          title: α
          type: number
        - name: converged
          title: '% converged'
          type: number
          visible: (algo:mc)
        - name: singular
          title: '% singular'
          type: number
          visible: (algo:mc)
          
          
    -   name: structure
        type: Group
        title: Model Structure
        visible: (show_vars || show_data || show_clusters)
        items:
              - name:  effectsize
                title: Effect size indices
                type: Table
                rows:  1
                columns: 
                  - name: type
                    title: 'Type'
                    type: text
                  - name: term
                    title: 'Term'
                    type: text
                  - name: value
                    title: 'Input'
                    type: number
                  - name: es
                    title: 'ES'
                    type: number
                  - name: cluster
                    title: 'Cluster'
                    type: text
                  - name: label
                    title: 'ES label'
                    type: text

              - name: showdata2
                visible: (show_vars)
                title: Variables parameters (one sample)
                type: Table
                columns: 
                  - name: what
                    title: 'Param'
                    type: text
                  - name: var
                    title: 'Variablle'
                    type: text
                  - name: cluster
                    title: 'Cluster'
                    type: text
                  - name: value
                    title: 'Value'
                    type: number
                  - name: evalue
                    title: 'Level'
                    type: number

              - name: showdata3
                visible: (show_clusters)
                title: Clusters parameters (one sample)
                type: Table
                columns: 
                  - name: cluster
                    title: 'Cluster'
                    type: text
                  - name: k
                    title: 'Levels (k)'
                    type: integer
                  - name: n
                    title: 'N per cluster (n)'
                    type: integer
                  - name: obs
                    title: 'N within'
                    type: integer

              - name: showdata4
                visible: (show_data)
                title: Data structure
                type: Table
                columns: 
                  - name: row
                    title: 'Row'
                    type: integer
                    
    - name: plotnotes
      title: Plot notes
      type: Html
      visible: false



